name: Build and Push

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - run: |
    
        docker build -t  ${{ secrets.DOCKER_USERNAME }}/before:latest ./services/before
        docker push ${{ secrets.DOCKER_USERNAME }}/before:latest
        docker build -t  ${{ secrets.DOCKER_USERNAME }}/after:latest ./services/after
        docker push ${{ secrets.DOCKER_USERNAME }}/after:latest 
        docker build -t  ${{ secrets.DOCKER_USERNAME }}/ai-controller:latest ./services/ai-controller
        docker push ${{ secrets.DOCKER_USERNAME }}/ai-controller:latest
