apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-controller
  template:
    metadata:
      labels:
        app: ai-controller
    spec:
      serviceAccountName: ai-controller-sa
      containers:
      - name: ai-controller
        image: pratik6958/ai-controller:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
