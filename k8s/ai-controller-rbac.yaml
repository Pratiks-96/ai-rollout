apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-controller-sa

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-controller-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-controller-binding
subjects:
- kind: ServiceAccount
  name: ai-controller-sa
roleRef:
  kind: Role
  name: ai-controller-role
  apiGroup: rbac.authorization.k8s.io
