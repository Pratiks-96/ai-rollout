apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-rollout-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: before
  endpoints:
  - port: http
    path: /metrics
    interval: 5s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-rollout-monitor-after
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: after
  endpoints:
  - port: http
    path: /metrics
    interval: 5s

---
apiVersion: v1
kind: Service
metadata:
  name: ai-demo
  namespace: default
spec:
  selector:
    app: ai-demo
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---

